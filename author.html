		<td class="auto-style2" style="width: 1192px" valign="top">作者<br />
		<br />
		<span class="auto-style4">名字：羅伯特˙F˙福克斯(Robert F. Fox)<br />
		　　　托比˙福克斯(Toby Fox)<br />
		<br />
		生日：1991/10/11<br />
		<br />
		介紹：<table align="right" style="width: 91%; height: 289px">
			<tr>
				<td class="auto-style10" style="width: 1283px; height: 220px" valign="top">
				是美國電子遊戲開發者、作曲家和配音演員,最出名的作品是角色扮演遊戲《Undertale》和《Deltarune》。<br />
				在製作遊戲時,為避免過度依賴他人,Toby Fox盡可能獨立完成製作,例如於2015發售的遊戲《Undertale》,他同時擔任了作家、作曲家、導演、設計師和程式設計等工作,除遊戲發明之外,他還多次受邀成為客座作曲家,其中較廣為人知的作品有包含寶可夢朱/紫、任天堂明星大亂鬥和寶可夢劍盾。</td>
			</tr>

		</span></td>
